services:
  postgres:
    image: postgres:16-alpine
    container_name: efiscal-postgres
    environment:
      POSTGRES_DB: efiscal
      POSTGRES_USER: efiscal
      POSTGRES_PASSWORD: efiscal
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U efiscal -d efiscal"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    container_name: efiscal-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/efiscal
      SPRING_DATASOURCE_USERNAME: efiscal
      SPRING_DATASOURCE_PASSWORD: efiscal
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
    container_name: efiscal-frontend
    depends_on:
      - backend
    environment:
      VITE_API_PROXY_TARGET: http://backend:8080
    ports:
      - "5173:5173"

volumes:
  postgres_data:
