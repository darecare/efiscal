server:
  port: 8080
  error:
    include-message: always

spring:
  application:
    name: efiscal-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:h2:file:./data/efiscal;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH}
    username: ${SPRING_DATASOURCE_USERNAME:sa}
    password: ${SPRING_DATASOURCE_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
